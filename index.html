<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo Trung Tâm Nạp Game</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}
body{
background:#0f172a;
color:white;
}
header{
background:#000;
padding:15px;
text-align:center;
font-size:24px;
font-weight:bold;
}
.banner{
height:180px;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#1e3a8a,#111827);
font-size:32px;
font-weight:bold;
color:#facc15;
}
.container{
max-width:800px;
margin:20px auto;
padding:15px;
}
.card{
background:#fff;
color:#000;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}
.card h2{
margin-bottom:15px;
}
input{
width:100%;
padding:15px;
border:1px solid #ddd;
border-radius:10px;
}
.packages{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}
.package{
padding:20px;
border:2px solid #ddd;
border-radius:10px;
text-align:center;
cursor:pointer;
}
.package.active{
border-color:red;
background:#fff2f2;
}
.methods{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}
.method{
padding:15px;
border:2px solid #ddd;
border-radius:10px;
text-align:center;
cursor:pointer;
}
.method.active{
border-color:red;
background:#fff2f2;
}
.btn{
width:100%;
padding:18px;
background:red;
color:white;
border:none;
border-radius:10px;
font-size:20px;
cursor:pointer;
margin-top:15px;
}
.popup{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
}
.popup-content{
width:350px;
background:white;
color:black;
padding:25px;
border-radius:20px;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}
.check{
width:80px;
height:80px;
background:#22c55e;
border-radius:50%;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
font-size:45px;
color:white;
}
.ok{
width:100%;
padding:15px;
margin-top:20px;
background:red;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}
</style>
</head>
<body>
<header>TRUNG TÂM NẠP GAME DEMO</header>
<div class="banner">
NẠP GAME DEMO
</div>
<div class="container">
<div class="card">
<h2>1. Nhập UID</h2>
<input id="uid" placeholder="Nhập UID">
</div>
<div class="card">
<h2>2. Chọn Gói</h2>
<div class="packages">
<div class="package active">💎 283 KC</div>
<div class="package">💎 566 KC</div>
<div class="package">💎 1132 KC</div>
<div class="package">💎 2830 KC</div>
<div class="package">💎 5750 KC</div>
<div class="package">💎 9999 KC</div>
</div>
</div>
<div class="card">
<h2>3. Thanh Toán</h2>
<div class="methods">
<div class="method active">Thẻ</div>
<div class="method">Momo</div>
<div class="method">ATM</div>
</div>
<button class="btn" onclick="showPopup()">
XỬ LÝ DEMO
</button>
</div>
</div>
<div class="popup" id="popup">
<div class="popup-content">
<div class="check">✓</div>
<h2 style="margin-top:15px;">
Hoàn tất (Demo)
</h2>
<p style="margin-top:10px;">
UID:
<b id="uidShow"></b>
</p>
<p id="timeShow" style="margin-top:10px;"></p>
<button class="ok" onclick="closePopup()">
OK
</button>
</div>
</div>
<script>
document.querySelectorAll(".package").forEach(item=>{
item.onclick=()=>{
document.querySelectorAll(".package")
.forEach(x=>x.classList.remove("active"));
item.classList.add("active");
};
});
document.querySelectorAll(".method").forEach(item=>{
item.onclick=()=>{
document.querySelectorAll(".method")
.forEach(x=>x.classList.remove("active"));
item.classList.add("active");
};
});
function showPopup(){
let uid=document.getElementById("uid").value;
if(!uid){
alert("Vui lòng nhập UID");
return;
}
document.getElementById("uidShow").innerText=uid;
document.getElementById("timeShow").innerText=
new Date().toLocaleString("vi-VN");
document.getElementById("popup").style.display="block";
}
function closePopup(){
document.getElementById("popup").style.display="none";
}
</script>
</body>
</html>
