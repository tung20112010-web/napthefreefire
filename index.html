<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trung Tâm Nạp KC Free Fire</title>

<style>
body{
    background:#f5f5f5;
    font-family:Arial,sans-serif;
    margin:0;
}

.header{
    background:#ff4d4d;
    color:white;
    text-align:center;
    padding:15px;
    font-size:24px;
    font-weight:bold;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.uid-box{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
}

.uid-box input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:5px;
}

.packages{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
}

.package{
    background:white;
    border:2px solid #ddd;
    border-radius:10px;
    padding:15px;
    text-align:center;
    cursor:pointer;
}

.package:hover{
    border-color:#ff4d4d;
}

.package.active{
    background:#ffe5e5;
    border-color:#ff4d4d;
}

.diamond{
    color:#00aaff;
    font-size:20px;
}

.selected{
    margin-top:20px;
    text-align:center;
    font-weight:bold;
}

.btn{
    margin-top:20px;
    width:100%;
    background:#ff3333;
    color:white;
    border:none;
    padding:15px;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

.note{
    margin-top:15px;
    text-align:center;
    color:#666;
}
</style>
</head>

<body>

<div class="header">
💎 Trung Tâm Nạp Kim Cương Free Fire
</div>

<div class="container">

<div class="uid-box">
<h3>Nhập UID Free Fire</h3>
<input type="text" placeholder="Nhập UID của bạn">
</div>

<div class="packages">

<div class="package">
<div class="diamond">💎 283 KC</div>
<p>Gói 50x</p>
</div>

<div class="package">
<div class="diamond">💎 566 KC</div>
<p>Gói 100x</p>
</div>

<div class="package">
<div class="diamond">💎 1132 KC</div>
<p>Gói 150x</p>
</div>

<div class="package">
<div class="diamond">💎 2830 KC</div>
<p>Gói 200x</p>
</div>

<div class="package active">
<div class="diamond">💎 5750 KC</div>
<p>Gói 300x</p>
</div>

<div class="package">
<div class="diamond">💎 9999 KC</div>
<p>Gói 400x</p>
</div>

<div class="package">
<div class="diamond">💎 12000 KC</div>
<p>Gói 500x</p>
</div>

<div class="package">
<div class="diamond">💎 15000 KC</div>
<p>Gói 600x</p>
</div>

</div>

<div class="selected">
Bạn đã chọn: 💎 5750 Kim Cương - Gói 300x
</div>

<button class="btn">
Xử Lý Thanh Toán
</button>

<div class="note">
An toàn • Nhanh chóng • Tự động
</div>

</div>

</body>
</html>
